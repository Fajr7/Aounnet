// ── Particles ──
function Particles(){
  return React.createElement('div',{style:{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:0}},
    Array.from({length:18}).map((_,i)=>React.createElement('div',{key:i,style:{
      position:"absolute",left:`${(i*57+13)%100}%`,top:`${(i*43+7)%100}%`,
      width:i%3===0?3:2,height:i%3===0?3:2,borderRadius:"50%",
      background:i%2===0?T.lavLight:T.blush,opacity:0.25+0.2*(i%3),
      animation:`drift${i%4} ${8+i*1.3}s ease-in-out infinite`,animationDelay:`${i*0.7}s`,
    }}))
  );
}

// ── PingModal ──
function PingModal({devices,connections,onClose}){
  const[log,setLog]=useState([]);
  const[busy,setBusy]=useState(false);
  const run=()=>{
    setLog([]);setBusy(true);
    const ends=devices.filter(d=>d.type===DTYPE.COMPUTER||d.type===DTYPE.SERVER||d.type===DTYPE.PRINTER);
    const msgs=[];
    for(let i=0;i<ends.length;i++)for(let j=i+1;j<ends.length;j++){
      const ok=connections.has(connKey(ends[i].id,ends[j].id));
      msgs.push({from:ends[i].label,to:ends[j].label,ok,ms:Math.floor(Math.random()*12+1)});
    }
    let idx=0;const t=setInterval(()=>{if(idx>=msgs.length){clearInterval(t);setBusy(false);return;}setLog(l=>[...l,msgs[idx++]]);},220);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(10,0,25,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(6px)"}}>
      <div style={{background:GRAD.card,border:`1px solid ${T.lavender}`,borderRadius:20,padding:"32px 36px",width:420,boxShadow:`0 0 60px ${T.glow}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{color:T.blush,fontSize:16,fontWeight:700,letterSpacing:2}}>🔍 PING TEST</span>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${T.mutedDark}`,color:T.muted,borderRadius:8,padding:"3px 11px",cursor:"pointer",fontSize:13}}>✕</button>
        </div>
        <div style={{background:"#0d0020",borderRadius:10,padding:"14px 16px",fontSize:12,minHeight:130,maxHeight:210,overflowY:"auto",marginBottom:16,border:`1px solid ${T.mutedDark}`,lineHeight:1.9}}>
          {log.length===0&&<span style={{color:T.mutedDark}}>$ awaiting command...</span>}
          {log.map((m,i)=><div key={i} style={{color:m.ok?T.green:T.red}}>{m.ok?"✓":"✗"}&nbsp;&nbsp;{m.from}&nbsp;→&nbsp;{m.to}&nbsp;&nbsp;<span style={{color:T.muted}}>{m.ok?`${m.ms}ms reply`:"timeout"}</span></div>)}
        </div>
        <button onClick={run} disabled={busy} className="btn-tool" style={{width:"100%",padding:"11px 0",background:busy?"#2d1254":GRAD.btn,borderRadius:11,color:T.white,fontSize:14,letterSpacing:2,opacity:busy?0.6:1}}>
          {busy?"▶▶ PINGING...":"▶  PING ALL DEVICES"}
        </button>
      </div>
    </div>
  );
}

// ── TraceModal ──
function TraceModal({devices,onClose}){
  const[target,setTarget]=useState("");
  const[log,setLog]=useState([]);
  const[busy,setBusy]=useState(false);
  const run=()=>{
    const dev=devices.find(d=>d.label.toLowerCase().includes(target.toLowerCase())&&d.ip);
    if(!dev){setLog([{hop:"-",ip:"Host not found",ms:"-",ok:false}]);return;}
    setBusy(true);setLog([]);
    const hops=[{ip:"192.168.0.1",ms:1},{ip:"10.0.0.1",ms:3},{ip:"203.0.113.1",ms:8},{ip:dev.ip,ms:12+Math.floor(Math.random()*10)}];
    let i=0;const t=setInterval(()=>{if(i>=hops.length){clearInterval(t);setBusy(false);return;}setLog(l=>[...l,{hop:i+1,...hops[i],ok:true}]);i++;},350);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(10,0,25,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(6px)"}}>
      <div style={{background:GRAD.card,border:`1px solid ${T.blush}`,borderRadius:20,padding:"32px 36px",width:420,boxShadow:`0 0 60px ${T.glowPink}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{color:T.lavLight,fontSize:16,fontWeight:700,letterSpacing:2}}>🛰 TRACEROUTE</span>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${T.mutedDark}`,color:T.muted,borderRadius:8,padding:"3px 11px",cursor:"pointer",fontSize:13}}>✕</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={target} onChange={e=>setTarget(e.target.value)} placeholder="Device label (e.g. Server)" style={{flex:1,background:"#0d0020",border:`1px solid ${T.mutedDark}`,borderRadius:9,padding:"8px 12px",color:T.white,fontSize:13,outline:"none"}}/>
          <button onClick={run} disabled={busy} className="btn-tool" style={{padding:"8px 16px",background:GRAD.btn,borderRadius:9,color:T.white,fontSize:13}}>Trace</button>
        </div>
        <div style={{background:"#0d0020",borderRadius:10,padding:"14px 16px",fontSize:12,minHeight:110,maxHeight:180,overflowY:"auto",border:`1px solid ${T.mutedDark}`,lineHeight:2}}>
          {log.length===0&&<span style={{color:T.mutedDark}}>$ traceroute &lt;target&gt;</span>}
          {log.map((m,i)=><div key={i} style={{color:m.ok?T.lavLight:T.red}}>{m.hop}&nbsp;&nbsp;{m.ip}&nbsp;&nbsp;<span style={{color:T.muted}}>{m.ms}ms</span></div>)}
        </div>
      </div>
    </div>
  );
}

// ── LevelComplete ──
function LevelComplete({level,timeLeft,timeLimit,xp,isLast,onNext,onMenu}){
  const pct=Math.round((timeLeft/timeLimit)*100);
  const stars=pct>66?3:pct>33?2:1;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(10,0,25,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1500,backdropFilter:"blur(8px)"}}>
      <div style={{background:GRAD.card,border:`1px solid ${T.lavender}`,borderRadius:28,padding:"44px 52px",textAlign:"center",maxWidth:420,boxShadow:`0 0 100px ${T.glow}`,animation:"popIn 0.45s cubic-bezier(.175,.885,.32,1.275)"}}>
        <div style={{fontSize:60,marginBottom:10}}>{isLast?"🏆":level.badge}</div>
        <h2 style={{fontFamily:"Georgia,serif",color:T.blush,margin:"0 0 6px",fontSize:24}}>{isLast?"Network Engineering Expert!":"Level Complete!"}</h2>
        <p style={{color:T.muted,fontSize:13,margin:"0 0 24px",lineHeight:1.6}}>{isLast?"Outstanding! You've mastered switching, routing, firewalls, VPNs and load balancing. Aoun Corp is fully connected!":(`Level ${level.id} — ${level.title} — cleared!`)}</p>
        <div style={{fontSize:32,marginBottom:16,letterSpacing:6}}>{"⭐".repeat(stars)}{"🌑".repeat(3-stars)}</div>
        <div style={{background:"rgba(0,0,0,0.35)",borderRadius:12,padding:"14px 20px",marginBottom:24,fontSize:12,color:T.lavLight,display:"flex",justifyContent:"space-around"}}>
          <div><div style={{color:T.muted,fontSize:10,marginBottom:3}}>TIME LEFT</div>{timeLeft}s</div>
          <div><div style={{color:T.muted,fontSize:10,marginBottom:3}}>SCORE</div>{pct}%</div>
          <div><div style={{color:T.muted,fontSize:10,marginBottom:3}}>XP</div>+{Math.round(xp*(pct/100))}</div>
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center"}}>
          <button onClick={onMenu} className="btn-tool" style={{padding:"11px 26px",border:`1px solid ${T.mutedDark}`,borderRadius:12,background:"transparent",color:T.muted,fontSize:13}}>← Menu</button>
          {!isLast&&<button onClick={onNext} className="btn-tool" style={{padding:"11px 26px",background:GRAD.btn,borderRadius:12,color:T.white,fontSize:13,fontWeight:700}}>Next Level →</button>}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──
function App(){
  const[screen,setScreen]=useState("menu");
  const[levelIdx,setLevelIdx]=useState(0);
  const[devices,setDevices]=useState([]);
  const[connections,setConnections]=useState(new Set());
  const[selected,setSelected]=useState(null);
  const[dragging,setDragging]=useState(null);
  const[dragOff,setDragOff]=useState({x:0,y:0});
  const[timeLeft,setTimeLeft]=useState(0);
  const[showStory,setShowStory]=useState(false);
  const[showPing,setShowPing]=useState(false);
  const[showTrace,setShowTrace]=useState(false);
  const[showComplete,setShowComplete]=useState(false);
  const[hintDismissed,setHintDismissed]=useState(false);
  const[totalXP,setTotalXP]=useState(0);
  const svgRef=useRef(null);
  const timerRef=useRef(null);
  const level=LEVELS[levelIdx];

  const initLevel=useCallback((idx)=>{
    const lvl=LEVELS[idx];
    setDevices(lvl.devices.map(d=>({...d})));
    setConnections(new Set());
    setSelected(null);setDragging(null);
    setTimeLeft(lvl.timeLimit);
    setShowComplete(false);setShowPing(false);setShowTrace(false);
    setHintDismissed(false);setLevelIdx(idx);setScreen("game");
  },[]);

  useEffect(()=>{
    if(screen!=="game"||showComplete||showStory)return;
    timerRef.current=setInterval(()=>{setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);return 0;}return t-1;});},1000);
    return()=>clearInterval(timerRef.current);
  },[screen,showComplete,showStory]);

  useEffect(()=>{
    if(screen!=="game")return;
    const done=level.required.every(([a,b])=>connections.has(connKey(a,b)));
    if(done&&level.required.length>0){
      clearInterval(timerRef.current);
      const earned=Math.round(level.xp*(timeLeft/level.timeLimit));
      setTotalXP(x=>x+earned);
      setTimeout(()=>setShowComplete(true),500);
    }
  },[connections,screen,level,timeLeft]);

  const svgPos=e=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return{x:0,y:0};return{x:e.clientX-r.left,y:e.clientY-r.top};};
  const onDevMD=(e,id)=>{e.stopPropagation();const p=svgPos(e);const dev=devices.find(d=>d.id===id);setDragging(id);setDragOff({x:p.x-dev.x,y:p.y-dev.y});};
  const onSvgMM=e=>{if(!dragging)return;const p=svgPos(e);setDevices(ds=>ds.map(d=>d.id===dragging?{...d,x:p.x-dragOff.x,y:p.y-dragOff.y}:d));};
  const onSvgMU=()=>setDragging(null);
  const onDevClick=(e,id)=>{
    e.stopPropagation();if(dragging)return;setHintDismissed(true);
    if(!selected){setSelected(id);return;}
    if(selected===id){setSelected(null);return;}
    const key=connKey(selected,id);
    setConnections(prev=>{const n=new Set(prev);n.has(key)?n.delete(key):n.add(key);return n;});
    setSelected(null);
  };

  const progress=level.required.filter(([a,b])=>connections.has(connKey(a,b))).length;
  const total=level.required.length;
  const timePct=timeLeft/level.timeLimit;
  const timerColor=timePct>0.5?T.green:timePct>0.25?T.yellow:T.red;

  // MENU
  if(screen==="menu"){
    return(
      <div style={{minHeight:"100vh",background:GRAD.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
        <Particles/>
        {[220,320,420].map((r,i)=>(
          <div key={i} style={{position:"absolute",left:"50%",top:"40%",transform:"translate(-50%,-50%)",width:r*2,height:r*2,borderRadius:"50%",border:`1px solid rgba(155,114,207,${0.07-i*0.02})`,pointerEvents:"none"}}/>
        ))}
        <div style={{position:"relative",textAlign:"center",animation:"popIn 0.6s ease",zIndex:1}}>
          <div style={{marginBottom:8,fontSize:64,animation:"float 3.5s ease-in-out infinite"}}>📡</div>
          <div style={{fontFamily:"'Cinzel',Georgia,serif",fontSize:"clamp(13px,2.5vw,16px)",color:T.blush,letterSpacing:8,marginBottom:4,opacity:0.8}}>AOUN PRESENTS</div>
          <h1 style={{fontFamily:"'Cinzel',Georgia,serif",fontSize:"clamp(26px,5vw,52px)",margin:"0 0 4px",fontWeight:900,background:`linear-gradient(135deg,${T.lavLight} 0%,${T.blush} 50%,${T.pink} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:3,lineHeight:1.1}}>
            NETWORK<br/>CONNECTION
          </h1>
          <p style={{color:T.mutedDark,fontSize:12,letterSpacing:6,margin:"8px 0 12px"}}>BUILD · ROUTE · SECURE · SCALE</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(155,114,207,0.1)",border:`1px solid rgba(155,114,207,0.35)`,borderRadius:30,padding:"6px 18px",marginBottom:28,boxShadow:`0 0 18px rgba(155,114,207,0.2)`}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:T.green,display:"inline-block",boxShadow:`0 0 6px ${T.green}`,animation:"shimmer 1.4s ease-in-out infinite"}}/>
            <span style={{fontSize:12,color:T.lavLight,letterSpacing:3}}>www.<span style={{color:T.blush,fontWeight:700}}>aounnet</span>.com</span>
          </div>
          {totalXP>0&&<div style={{background:"rgba(155,114,207,0.15)",border:`1px solid ${T.lavender}`,borderRadius:20,padding:"6px 18px",fontSize:12,color:T.lavLight,marginBottom:16,display:"inline-block",letterSpacing:2}}>⭐ {totalXP} XP earned</div>}
          <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
            {LEVELS.map((lvl,i)=>(
              <button key={lvl.id} className="btn-tool" onClick={()=>{initLevel(i);setShowStory(true);}}
                style={{width:310,padding:"14px 20px",background:i===0?GRAD.btn:"rgba(155,114,207,0.08)",border:`1px solid ${i===0?"transparent":T.mutedDark}`,borderRadius:14,color:T.white,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:14}}>
                <span style={{fontSize:26}}>{lvl.badge}</span>
                <div><div style={{fontWeight:700,fontFamily:"Georgia,serif",marginBottom:2}}>Level {lvl.id}: {lvl.title}</div><div style={{fontSize:11,color:i===0?T.pinkLight:T.muted}}>{lvl.subtitle}</div></div>
                <div style={{marginLeft:"auto",fontSize:11,color:T.mutedDark}}>+{lvl.xp}xp</div>
              </button>
            ))}
          </div>
          <p style={{color:T.mutedDark,fontSize:11,marginTop:28,letterSpacing:2}}>CLICK DEVICE → CLICK DEVICE TO CONNECT &nbsp;|&nbsp; DRAG TO REPOSITION</p>
          <p style={{color:"rgba(155,114,207,0.3)",fontSize:10,marginTop:8,letterSpacing:3}}>© aounnet.com</p>
        </div>
      </div>
    );
  }

  // GAME
  return(
    <div style={{minHeight:"100vh",background:GRAD.bg,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden",userSelect:"none"}}>
      <Particles/>
      {/* Top bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 18px",background:GRAD.header,borderBottom:`1px solid rgba(155,114,207,0.2)`,backdropFilter:"blur(14px)",flexShrink:0,zIndex:10,position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <button className="btn-tool" onClick={()=>setScreen("menu")} style={{background:"none",border:`1px solid ${T.mutedDark}`,color:T.muted,borderRadius:9,padding:"5px 13px",fontSize:12}}>← Menu</button>
          <div>
            <div style={{color:T.white,fontFamily:"Georgia,serif",fontWeight:700,fontSize:14}}>{level.badge} Level {level.id}: {level.title}</div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
              <div style={{color:T.mutedDark,fontSize:10,letterSpacing:1}}>{level.objective}</div>
              <span style={{color:T.mutedDark,fontSize:9}}>·</span>
              <span style={{fontSize:9,color:T.blush,opacity:0.7,letterSpacing:1}}>aounnet.com</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {[["🔍","Ping",()=>setShowPing(true)],["🛰","Trace",()=>setShowTrace(true)]].map(([ico,lbl,fn])=>(
            <button key={lbl} className="btn-tool" onClick={fn} style={{padding:"6px 13px",background:"rgba(155,114,207,0.12)",border:`1px solid rgba(155,114,207,0.3)`,borderRadius:9,color:T.lavLight,fontSize:12,display:"flex",alignItems:"center",gap:5}}>
              {ico} {lbl}
            </button>
          ))}
          <div style={{textAlign:"right",marginLeft:6}}>
            <div style={{fontSize:9,color:T.mutedDark,letterSpacing:2,marginBottom:2}}>TIME</div>
            <div style={{fontSize:22,fontWeight:900,color:timerColor,letterSpacing:3,animation:timePct<0.25?"shimmer 0.8s ease-in-out infinite":"none"}}>
              {String(Math.floor(timeLeft/60)).padStart(2,"0")}:{String(timeLeft%60).padStart(2,"0")}
            </div>
          </div>
        </div>
      </div>
      {/* Progress */}
      <div style={{padding:"8px 18px",background:"rgba(26,9,51,0.5)",borderBottom:`1px solid rgba(155,114,207,0.12)`,flexShrink:0,zIndex:9}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.mutedDark,marginBottom:5,letterSpacing:1}}>
          <span>CONNECTIONS</span><span>{progress}/{total}</span>
        </div>
        <div style={{height:5,background:"rgba(155,114,207,0.12)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:3,background:GRAD.btn,transition:"width 0.5s",width:`${(progress/total)*100}%`,boxShadow:`0 0 10px ${T.glow}`}}/>
        </div>
      </div>
      {/* Canvas */}
      <div style={{flex:1,position:"relative",overflow:"hidden",zIndex:1}}>
        <div style={{position:"absolute",inset:0,pointerEvents:"none",backgroundImage:"radial-gradient(circle,rgba(155,114,207,0.12) 1px,transparent 1px)",backgroundSize:"30px 30px"}}/>
        <svg ref={svgRef} style={{width:"100%",height:"100%",position:"absolute",inset:0}}
          onClick={()=>setSelected(null)} onMouseMove={onSvgMM} onMouseUp={onSvgMU} onMouseLeave={onSvgMU}>
          <defs>
            <filter id="devGlow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="selGlow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <linearGradient id="cableGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor={T.lavender}/><stop offset="100%" stopColor={T.pink}/>
            </linearGradient>
          </defs>
          {[...connections].map(key=>{
            const[aId,bId]=key.split("~~");
            const a=devices.find(d=>d.id===aId),b=devices.find(d=>d.id===bId);
            if(!a||!b)return null;
            const req=level.required.some(([x,y])=>connKey(x,y)===key);
            return(
              <g key={key}>
                {req&&<line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={T.lavender} strokeWidth={6} opacity={0.15}/>}
                <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={req?"url(#cableGrad)":T.cableBad} strokeWidth={req?2.5:1.5} strokeDasharray={req?"none":"5,4"} opacity={req?0.9:0.4}/>
                {req&&<circle cx={(a.x+b.x)/2} cy={(a.y+b.y)/2} r={3.5} fill={T.blush} opacity={0.85}/>}
              </g>
            );
          })}
          {devices.map(dev=>{
            const cfg=DCONFIG[dev.type];const isSel=selected===dev.id;const s=cfg.size;
            const isRound=dev.type===DTYPE.ROUTER||dev.type===DTYPE.INTERNET;
            return(
              <g key={dev.id} className="dev-g" transform={`translate(${dev.x},${dev.y})`}
                onClick={e=>onDevClick(e,dev.id)} onMouseDown={e=>onDevMD(e,dev.id)}
                style={{animation:isSel?"pulseGlow 1.2s ease-in-out infinite":"none"}}>
                {isSel&&<ellipse cx={0} cy={0} rx={s+14} ry={s+14} fill="none" stroke={T.blush} strokeWidth={1.5} strokeDasharray="5,3" opacity={0.7}/>}
                {isSel&&<ellipse cx={0} cy={0} rx={s+9} ry={s+9} fill={T.glowPink} opacity={0.25}/>}
                {isRound
                  ?<circle r={s} fill={cfg.color} stroke={isSel?T.blush:cfg.border} strokeWidth={isSel?2.5:1.5} filter={isSel?"url(#selGlow)":"url(#devGlow)"}/>
                  :<rect x={-s} y={-s} width={s*2} height={s*2} rx={9} fill={cfg.color} stroke={isSel?T.blush:cfg.border} strokeWidth={isSel?2.5:1.5} filter={isSel?"url(#selGlow)":"url(#devGlow)"}/>}
                <text textAnchor="middle" dominantBaseline="middle" fontSize={s-6} y={-1}>{cfg.icon}</text>
                <text textAnchor="middle" y={s+15} fontSize={9.5} fill={isSel?T.blush:T.lavLight} fontFamily="'Courier New',monospace" fontWeight={isSel?700:400}>{dev.label}</text>
                {dev.ip&&<text textAnchor="middle" y={s+26} fontSize={8.5} fill={T.mutedDark} fontFamily="'Courier New',monospace">{dev.ip}</text>}
              </g>
            );
          })}
        </svg>
        {!hintDismissed&&(
          <div style={{position:"absolute",bottom:20,left:"50%",transform:"translateX(-50%)",background:"rgba(26,9,51,0.92)",border:`1px solid ${T.lavender}`,borderRadius:12,padding:"10px 22px",fontSize:12,color:T.lavLight,animation:"fadeSlide 0.4s ease",backdropFilter:"blur(10px)",whiteSpace:"nowrap",zIndex:20}}>
            💡 {level.hint}
          </div>
        )}
        {selected&&(
          <div style={{position:"absolute",top:14,left:"50%",transform:"translateX(-50%)",background:"rgba(155,114,207,0.18)",border:`1px solid ${T.lavender}`,borderRadius:20,padding:"7px 20px",fontSize:12,color:T.blush,backdropFilter:"blur(8px)",animation:"fadeSlide 0.3s ease",zIndex:20,whiteSpace:"nowrap"}}>
            {DCONFIG[devices.find(d=>d.id===selected)?.type]?.icon}&nbsp;
            <b>{devices.find(d=>d.id===selected)?.label}</b> selected — click another device to cable
          </div>
        )}
        {timeLeft===0&&!showComplete&&(
          <div style={{position:"absolute",inset:0,background:"rgba(10,0,25,0.88)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:50}}>
            <div style={{fontSize:52,marginBottom:12}}>⌛</div>
            <h2 style={{color:T.red,fontFamily:"Georgia,serif",marginBottom:8}}>Connection Timed Out</h2>
            <p style={{color:T.muted,fontSize:13,marginBottom:24}}>The network failed to come online in time.</p>
            <div style={{display:"flex",gap:12}}>
              <button className="btn-tool" onClick={()=>initLevel(levelIdx)} style={{padding:"11px 26px",background:GRAD.btn,borderRadius:12,color:T.white,fontSize:13}}>↺ Retry</button>
              <button className="btn-tool" onClick={()=>setScreen("menu")} style={{padding:"11px 26px",border:`1px solid ${T.mutedDark}`,background:"transparent",borderRadius:12,color:T.muted,fontSize:13}}>← Menu</button>
            </div>
          </div>
        )}
      </div>
      {/* Checklist sidebar */}
      <div style={{position:"absolute",right:0,top:90,bottom:0,width:165,background:"rgba(10,0,25,0.75)",borderLeft:`1px solid rgba(155,114,207,0.15)`,padding:"14px 12px",overflowY:"auto",backdropFilter:"blur(10px)",zIndex:10}}>
        <div style={{fontSize:9,color:T.mutedDark,letterSpacing:3,marginBottom:12}}>REQUIRED LINKS</div>
        {level.required.map(([a,b])=>{
          const done=connections.has(connKey(a,b));
          const da=devices.find(d=>d.id===a),db=devices.find(d=>d.id===b);
          return(
            <div key={`${a}-${b}`} style={{display:"flex",alignItems:"flex-start",gap:7,marginBottom:9,fontSize:10,color:done?T.green:T.mutedDark,transition:"color 0.3s"}}>
              <span style={{fontSize:13,flexShrink:0}}>{done?"✅":"○"}</span>
              <span style={{fontFamily:"'Courier New',monospace",lineHeight:1.4}}>{da?.label}<br/>↔ {db?.label}</span>
            </div>
          );
        })}
      </div>
      {showStory&&<StoryCard level={level} onStart={()=>setShowStory(false)}/>}
      {showPing&&<PingModal devices={devices} connections={connections} onClose={()=>setShowPing(false)}/>}
      {showTrace&&<TraceModal devices={devices} onClose={()=>setShowTrace(false)}/>}
      {showComplete&&<LevelComplete level={level} timeLeft={timeLeft} timeLimit={level.timeLimit} xp={level.xp} isLast={levelIdx===LEVELS.length-1} onNext={()=>{initLevel(levelIdx+1);setShowStory(true);}} onMenu={()=>{setShowComplete(false);setScreen("menu");}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
